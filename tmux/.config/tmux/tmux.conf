# set true color
set-option -sa terminal-overrides ",xterm*:Tc"

# ensure Homebrew tmux is available to plugin scripts started by tmux
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# scrollback buffer
set -g history-limit 50000

# enable mouse support
set -g mouse on

# change prefix key to ctrl-z
unbind C-b
set-option -g prefix C-z
bind-key C-z send-prefix

# intuitive split bindings
bind v split-window -h  # vertical split (side by side)
bind h split-window -v  # horizontal split (top and bottom)

# 1-indexed windows and panes
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on


# selenized black - https://github.com/jan-warchol/selenized
set -g status-style                 "bg=#252525,fg=#777777"
set -g window-status-style          "bg=#252525,fg=#777777"
set -g window-status-current-style  "bg=#3b3b3b,fg=#3fc5b7,bold"
set -g window-status-activity-style "bg=#252525,fg=#dbb32d"
set -g pane-border-style            "fg=#3b3b3b"
set -g pane-active-border-style     "fg=#3fc5b7"
set -g message-style                "bg=#3b3b3b,fg=#dedede"
set -g mode-style                   "bg=#3fc5b7,fg=#181818"
set -g status-left                  "#[fg=#181818,bg=#3fc5b7,bold] #S #[default] "
set -g status-right                 "#[fg=#777777]%H:%M #[fg=#3fc5b7]%d-%b"
set -g pane-border-format           "#[fg=#3fc5b7] #(echo '#{pane_current_path}' | sed \"s|$HOME|~|\") "

# plugins
set -g @plugin 'tmux-plugins/tmux-sensible'

# pane border shows current directory
set -g pane-border-status top

# Extended key support for modern terminals
set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'

# open yazi in a floating popup (prefix+y)
bind y display-popup -E -w 85% -h 85% "zsh -ic 'y'"

# initialize tpm redux (keep this line at the bottom)
run '~/.tmux/plugins/tpm-redux/tpm'
